name: Build and Publish Personal Morning Briefing

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'docker/wireproxy/**'
      - '.github/workflows/build-atlas.yml'
  schedule:
    - cron: '30 4 * * 1'  # Weekly Monday 04:30 UTC

permissions:
  contents: read
  packages: write

concurrency:
  group: build-atlas
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_OWNER: cpoepke

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout n8t-scraper
        uses: actions/checkout@v4
        with:
          repository: cpoepke/scraper
          token: ${{ secrets.GH_SCRAPER_TOKEN }}
          path: n8t-scraper

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e n8t-scraper && pip install -r requirements.txt && pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Checkout n8t-scraper
        uses: actions/checkout@v4
        with:
          repository: cpoepke/scraper
          token: ${{ secrets.GH_SCRAPER_TOKEN }}
          path: n8t-scraper

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/atlas-morning-briefing
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=schedule,pattern={{date 'YYYYMMDD'}}
          labels: |
            org.opencontainers.image.source=https://github.com/cpoepke/atlas-morning-briefing

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-wireproxy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push wireproxy
        uses: docker/build-push-action@v6
        with:
          context: docker/wireproxy
          file: docker/wireproxy/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/wireproxy:latest
          cache-from: type=gha,scope=wireproxy
          cache-to: type=gha,mode=max,scope=wireproxy
